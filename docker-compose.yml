version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: medical_crag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist the ChromaDB vectorstore between restarts
      - chroma_data:/app/data/vectorstore
      # Persist audit logs
      - log_data:/app/logs
    environment:
      # Override path-sensitive env vars to match container paths
      CHROMA_PATH: /app/data/vectorstore
      AUDIT_LOG_PATH: /app/logs/crag_audit.jsonl
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:
  log_data: